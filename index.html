<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Scrolled so far I grew up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- GSAP Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollSmoother.min.js"></script>

</head>


<body>
  <div class="gradient">
    <img src="img/gradient-header.png">
  </div>
  <div id="smooth-wrapper">
    <div id="smooth-content">


      <!-- ── Titel: I scrolled so far I grew up. Hier soll eine Animation stattfinden von "SRFF" 100; zu "SRFF" 0;. Sie soll im Loop unendlich abspielen─────────────── -->
      <h1>I scrolled so far I grew up</h1>


      <!-- ── ERA 1: WELCOME TO THE INTERNET ─────────────── -->
      <p class="era1">Welcome to the internet</p>

      <div class="stage">
        <!--  2016  -->
        <!--  1 Insta Post  -->
        <div class="post-wrapper">
          <div class="insta-post">
            <img src="img/2016/post 1/post2016-01 Kopie 2.png">
          </div>

          <div class="floater1 floater" attr-float-speed-y="-30" attr-float-speed-x="30" attr-scale="1.2">
            <!-- das sind die pixel Werte für die Bewegung. Du kannst auch mit negativen Werten arbeitn, dann geht die Bewegung hoch-->
             <!-- zusätzlich kannst du noch eine Skalierung festlegen-->
            <img src="img/2016/post 1/post2016-01 Kopie.png">
          </div>

          <div class="floater2 floater" attr-float-speed-y="200" attr-float-speed-x="-20">
            <img src="img/2016/post 1/post2016-01.png">
          </div>
        </div>

        <!-- wenn der gesamte Insta Post erscheint, sieht es zunächst nach einem «ganzen Bild» aus. Doch floater1 und floater2 haben unterschiedliche Geeschwindigkeiten, welche schnellere als die Geschwindigkeit von .insta-post ist. Ausserdem sollen sich auch nicht alle .insta-post gleich schnell bewegen, damit Überlagerungen entstehen können. -->

        <div class="post-wrapper">
          <div class="insta-post">
            <img src="img/2016/post 2/post2016-02 2.png">
          </div>

          <div class="floater1 floater" attr-float-speed-y="10" attr-float-speed-x="-50" attr-scale="0.5">
            <img src="img/2016/post 2/post2016-02 3.png">
          </div>

          <div class="floater2 floater" attr-float-speed-y="40" attr-float-speed-x="40" attr-scale="0.8">
            <img src="img/2016/post 2/post2016-02.png">
          </div>
        </div>


        <!-- Insta Update. Dieses Text Elemente soll einen Fade in haben, etwas stehen bleiben und anschliessend verschwinden wie auf https://sabrinazeltner.com/. Durch die verschiedenen z-index fliegen floater über das .insta-update und andere fahren darunter hindurch  -->
        <div class="insta-update" attr-delay-hold="500"> <!--über das Attribut attr-delay-hold kannst du setzen, wie lange das Element stehenbleibt -->
          <div class="insta-update-header">
            <span>15.</span>
            <span>März</span>
            <span>2016</span>
          </div>
          <p class="insta-update-text">
            Die Reihenfolge der Posts auf der User*innen Timeline wird neu
            vom Algorithmus bestimmt und ist nicht mehr chronologisch.
          </p>
        </div>

        <div class="post-wrapper">
          <div class="insta-post">
            <img src="img/2016/post4/post2016-04 Kopie 2.png">
          </div>

          <div class="floater1 floater" attr-float-speed-y="40" attr-float-speed-x="40" attr-scale="1.2">
            <img src="img/2016/post4/post2016-04 Kopie.png">
          </div>

          <div class="floater2 floater" attr-float-speed-y="40" attr-float-speed-x="40"">
            <img src="img/2016/post4/post2016-04.png">
          </div>
        </div>
      </div>
    </div>


    <script src="parallax.js"></script>
  </div>
  </div>

</body>
